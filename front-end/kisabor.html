<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ki Sabor | Pedido Certo</title>

  <!-- CSS GLOBAL -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="imagens/Ki_Sabor.jpeg" type="image/x-icon">
</head>

<!-- IMPORTANTE: identifica qual loja é -->
<body data-loja="kisabor">
 
  <!-- HEADER DA LOJA -->
  <header class="header-loja">
    <div class="topo-loja">
        <button class="btn-voltar" onclick="history.back()"> ← </button>
      <img src="imagens/logo.kisab.jpeg" class="logo-loja">
      <div class="info-topo">
        <h2 class="nome-loja">Ki Sabor</h2>
        <span class="status-text"></span>
      </div>
    </div>

     <!-- ENDEREÇO -->
  <div class="endereco-loja">
    📍 Entregar em: <span id="endereco-usuario">Informe seu endereço</span>
  </div>

  </header>

  <!-- CATEGORIAS -->
  <section class="categorias">
    <button class="categoria ativa">Salgados</button>
    <button class="categoria">Pastes</button>
    <button class="categoria">Delicias</button>
    <button class="categoria">Porcoes</button>
    <button class="categoria">Lanches</button>
    <button class="categoria">Bebidas</button>
</section>

  <!-- LISTA DE PRODUTOS -->
  <main class="produtos">
    <div id="lista-produtos">
      <!-- Produtos renderizados via JS -->
    </div>
  </main>

  <!-- CARRINHO FIXO -->
  <div class="carrinho-bar">
    <button class="btn-carrinho" onclick="abrirCarrinho()">
       Ver Carrinho = <span id="total-carrinho">R$ 0.00</span>
    </button>
  </div>

  <!-- MODAL DE PRODUTO / MONTE SUA PIZZA -->
  <div class="modal" id="modalProduto">
    <div class="modal-content">

      <button class="btn-fechar" id="fecharModal">×</button>

      <img id="modalImagem" src="" alt="">

      <h2 id="modalNome"></h2>
      <p id="modalPrecoBase"></p>

      <div class="tamanhos" id="tamanhosModal">
        <button class="btn-tamanho ativo" data-size="P">P</button>
        <button class="btn-tamanho" data-size="M">M</button>
        <button class="btn-tamanho" data-size="G">G</button>
      </div>

      <p id="contadorSabores"></p>

      <div id="listaAdicionais"></div>

      <div class="modal-total">
        <span>Total</span>
        <span id="modalTotal">R$ 0.00</span>
      </div>

      <button id="btnAdicionarCarrinho">Adicionar ao carrinho</button>

    </div>
  </div>

  <!-- JS -->
   <script>
  localStorage.setItem("lojaSelecionada", "Ki Sabor");
</script>

  <script src="js/lojas.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
