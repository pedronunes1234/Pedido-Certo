<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel | Pedido Certo</title>
  <link rel="stylesheet" href="painel.css">
</head>
<body>

  <div id="telaLogin">
    <div class="login-box">
      <h2>Pedido Certo</h2>
      <p>Painel do lojista</p>
      <input type="email" id="emailLogin" placeholder="Seu email">
      <input type="password" id="senhaLogin" placeholder="Sua senha">
      <button id="btnLogin">Entrar</button>
      <p id="erroLogin" class="erro"></p>
    </div>
  </div>

  <div id="telaPainel" style="display:none;">
    <header class="header-painel">
      <div class="header-info">
        <div class="header-linha-topo">
          <span id="nomeLoja"></span>
          <button id="btnSair">Sair</button>
        </div>
        <span id="contadorNovos"></span>
      </div>
    </header>

    <div class="filtros">
      <button class="filtro ativo" data-status="todos">Todos</button>
      <button class="filtro" data-status="Aguardando Pagamento">Aguardando</button>
      <button class="filtro" data-status="Em preparo">Em preparo</button>
      <button class="filtro" data-status="Saiu para entrega">Saiu</button>
      <button class="filtro" data-status="Entregue">Entregue</button>
    </div>

    <div id="listaPedidos" class="lista-pedidos"></div>
  </div>

  <audio id="somNovoPedido" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

  <script src="painel.js"></script>
</body>
</html>
