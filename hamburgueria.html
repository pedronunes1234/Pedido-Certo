<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Burger House | Pedido Certo</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="shortcut icon" href="imagens/logo.bur.png" type="image/x-icon">
</head>

<body data-loja="hamburgueria">

  <!-- HEADER -->
  <header class="header-loja">

    <div class="topo-loja">

      <button class="btn-voltar" onclick="history.back()">
        ←
      </button>

      <img
        src="imagens/logo.bur.png"
        alt="Logo Burger House"
        class="logo-loja"
      >

      <div class="info-topo">
        <h2 class="nome-loja">Burger House</h2>
        <span class="status-text"></span>
      </div>

    </div>

    <!-- ENDEREÇO -->
    <div class="endereco-loja">
      📍 Entregar em:
      <span id="endereco-usuario">Informe seu endereço</span>
    </div>

  </header>

  <!-- CATEGORIAS -->
  <div class="categorias">

    <button class="categoria ativa">
      comidas
    </button>

    <button class="categoria">
      Bebidas
    </button>

  </div>

  <!-- PRODUTOS -->
  <main class="produtos">

    <div id="lista-produtos">

      <!-- Produtos carregados pelo JS -->

    </div>

  </main>

  <!-- CARRINHO FIXO -->
  <div class="carrinho-bar">

    <button class="btn-carrinho" onclick="abrirCarrinho()">
      Ver Carrinho •
      <span id="total-carrinho">R$ 0,00</span>
    </button>

  </div>

  <!-- SCRIPTS -->
  <script src="js/lojas.js"></script>
  <script src="js/script.js"></script>

</body>
</html>
